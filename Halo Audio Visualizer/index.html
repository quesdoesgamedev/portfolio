<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halo Audio Visualizer</title>

  <!-- Bulma Stylesheets -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.3/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    integrity="sha512-iBBXm8fW90+nuLcSKlbmrPcLa0OT92xO1BIsZ+ywDWZCvqsWgccV3gFoRBv0z+8dLJgyAHIhR35VZc2oM/gI1w=="
    crossorigin="anonymous" referrerpolicy="no-referrer"/>

  <link href="./styles/styles-2.css" type="text/css" rel="stylesheet">


</head>

<body>
  <nav class="navbar has-shadow">
    <!-- logo / brand-->
    <div class="navbar-brand">
      <a class="navbar-item" href="index.html">
        <img src="media/logo.png" alt="Audio Visualizer Logo">
      </a>
      <a class="navbar-burger" id="burger">
        <span></span>
        <span></span>
        <span></span>
      </a>
    </div>

    <div class="navbar-start">
      <div class="navbar-menu" id="navbar-links">
        <div class="navbar-end">
          <a class="navbar-item is-hoverable" href="index.html">
            App
          </a>

          <a class="navbar-item is-hoverable" href="about.html">
            About
          </a>
        </div>
      </div>

    </div> <!-- end navbar-start -->
  </nav>

  <!-- App  -->
  <div class="container px-5">
    <section class="section box has-background-primary">
      <h1 class="is-size-1 has-text-centered title">???</h1>
      <div class="container">
        <div class="columns is-vcentered">
          <div class="column">
            <div class="hero is-large is-info p-2 box">
              <div class="hero-head">
                <div class="is-flex is-justify-content-center">
                  <canvas width="800" height="400"></canvas>
                </div>

                <div id="info">
                  <section>
                    <h2 id="song-name">Current Song: </h2>
                    <h2 id="song-length">Length: </h2>
                  </section>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="controls">
        <section class="section has-background-white py-5 box controls-section">
          <div class="container">
            <div class="is-flex is-flex-wrap-wrap is-align-items-center is-justify-content-center is-gap-5">

              <!-- Play Button -->
              <button id="play-button" data-playing="no" class="button is-primary mx-2"></button>

              <!-- Fullscreen Button -->
              <button id="fs-button" class="button is-link mx-2">Full Screen</button>

              <!-- Track Select -->
              <div class="field mx-2">
                <label class="label is-small mb-1">Track:</label>
                <div class="control">
                  <div class="select is-small">
                    <select id="track-select">
                      <option value="media/Halo Theme Song.mp3" selected>Halo Theme Song</option>
                      <option value="media/Covenant Dance.mp3">Covenant Dance</option>
                      <option value="media/Through The Trees.mp3">Through The Trees</option>
                    </select>
                  </div>
                </div>
              </div>

              <!-- Volume Slider -->
              <div class="field mx-2">
                <label class="label is-small mb-1">Volume:</label>
                <div class="control">
                  <input type="range" id="volume-slider" min="0" max="2" value="1" step="0.01" class="slider is-small">
                </div>
              </div>

              <!-- Volume Label -->
              <span id="volume-label" class="tag is-info is-light">???</span>

            </div>
          </div>
        </section>

        <section class="section has-background-white py-5 box controls-section">
          <div class="container">
            <div class="is-flex is-flex-wrap-wrap is-align-items-center is-justify-content-center is-gap-4">

              <!-- Visual Options -->

              <label class="checkbox mx-2">
                <input type="checkbox" id="cb-bars">
                Show Bars
              </label>

              <label class="checkbox mx-2">
                <input type="checkbox" id="cb-circles">
                Show Circles
              </label>

              <label class="checkbox mx-2">
                <input type="checkbox" id="cb-noise">
                Show Noise
              </label>

              <label class="checkbox mx-2">
                <input type="checkbox" id="cb-invert">
                Invert Colors
              </label>

              <label class="checkbox mx-2">
                <input type="checkbox" id="cb-emboss">
                Show Emboss
              </label>

              <label class="checkbox mx-2">
                <input type="checkbox" id="cb-waveform-toggle">
                Show Waveform
              </label>

              <div class="is-flex is-flex-wrap-wrap is-align-items-center is-justify-content-center py-5">
                <!-- Bass Slider -->
                <div class="field has-addons mx-4 is-align-items-center">
                  <div class="control">
                    <label class="label is-small mb-0 mx-2" for="bass-filter-slider">Bass:</label>
                  </div>
                  <div class="control">
                    <input type="range" id="bass-filter-slider" min="-30" max="30" value="0" step="1"
                      class="slider is-small">
                  </div>
                  <div class="control">
                    <span id="bass-label" class="tag is-light">0</span>
                  </div>
                </div>

                <!-- Treble Slider -->
                <div class="field has-addons mx-4 is-align-items-center">
                  <div class="control">
                    <label class="label is-small mb-0 mx-2" for="treble-filter-slider">Treble:</label>
                  </div>
                  <div class="control">
                    <input type="range" id="treble-filter-slider" min="-30" max="30" value="0" step="1"
                      class="slider is-small">
                  </div>
                  <div class="control">
                    <span id="treble-label" class="tag is-light">0</span>
                  </div>
                </div>
              </div>


            </div>
          </div>
        </section>


        <p id="instructions">???</p>
      </div>

    </section>
  </div>

  <script src="dist/bundle.js"></script>
</body>

</html>
