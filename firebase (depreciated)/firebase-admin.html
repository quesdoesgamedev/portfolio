<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Firebase Admin</title>
</head>

<body>
    <h1>High Scores</h1>
    <ul id="scoresList">
        <li>No data yet!</li>
    </ul>

    <script type="module">
        /* #1 - The Firebase setup code goes here  - both imports, `firebaseConfig` and `app` */
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";
        // TODO: Add SDKs for Firebase products that you want to use
        // https://firebase.google.com/docs/web/setup#available-libraries

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCUttr2tKNnUCkx5EIsH_y8hlhmYToTlcg",
            authDomain: "high-scores-69157.firebaseapp.com",
            projectId: "high-scores-69157",
            storageBucket: "high-scores-69157.firebasestorage.app",
            messagingSenderId: "365096764655",
            appId: "1:365096764655:web:3d79f8c5933847bebf471a"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        console.log(app); // make sure firebase is loaded



        // #2 NEW STUFF
        const db = getDatabase();
        const scoresRef = ref(db, 'scores');

        const scoresChanged = (snapshot) => {
            // Clear the list
            scoresList.innerHTML = '';

            snapshot.forEach(score => {
                const childData = score.val();
                const li = document.createElement('li');
                li.textContent = `${childData.userId} - ${childData.game}: ${childData.score}`;
                scoresList.appendChild(li);
            });

            // If there were no scores, show default message
            if (!snapshot.exists()) {
                scoresList.innerHTML = '<li>No data yet!</li>';
            }
        }

        onValue(scoresRef, scoresChanged);

    </script>
</body>

</html>
